<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiCN海报助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{
            background:linear-gradient(135deg,#1a1a2e,#162d3e);
            min-height:100vh;padding:20px;color:#fff
        }
        .container{max-width:500px;margin:0 auto}
        .header{
            text-align:center;margin:0 0 25px;
            padding:20px;background:rgba(255,255,255,.05);
            border-radius:16px
        }
        .header h1{
            font-size:26px;
            background:linear-gradient(90deg,#00d4ff,#ff00ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent
        }
        .section{
            background:rgba(255,255,255,.05);
            border-radius:16px;padding:20px;margin-bottom:20px
        }
        .section h2{
            font-size:18px;margin-bottom:15px;text-align:center
        }

        .stamp-list{
            display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px
        }
        .stamp-item{
            width:100%;aspect-ratio:1;
            border:2px solid transparent;
            border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            background:rgba(255,255,255,.1);cursor:pointer
        }
        .stamp-item img{max-width:70%;max-height:70%;object-fit:contain}
        .stamp-item.selected{border-color:#00d4ff;background:rgba(0,212,255,.2)}

        .preview-area{
            display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:60px
        }
        .preview-item{
            width:60px;height:60px;border-radius:8px;overflow:hidden;position:relative
        }
        .preview-item img{width:100%;height:100%;object-fit:cover}

        .upload-btn{
            width:100%;padding:14px;
            border:2px dashed #00d4ff;
            background:transparent;
            border-radius:12px;color:#fff;font-size:16px;
            margin-bottom:12px;cursor:pointer
        }

        .btn-group{
            display:flex;gap:8px;width:100%
        }
        .process-btn{
            flex:1;padding:14px;
            border:none;border-radius:12px;
            background:linear-gradient(90deg,#0099ff,#00ccff);
            color:#fff;font-size:16px;cursor:pointer
        }
        .process-btn:disabled{opacity:.5}
        .download-btn{
            flex:1;padding:14px;
            border:none;border-radius:12px;
            background:#00cc66;color:#fff;font-size:16px;cursor:pointer;display:none
        }

        #fileInput{display:none}
        .result-area{display:none;margin-top:10px}
        .result-item{
            display:flex;align-items:center;gap:10px;
            padding:10px;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:10px
        }
        .result-item img{width:50px;height:50px;border-radius:6px;object-fit:cover}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LiCN海报助手</h1>
        <div>450×700 限定标一键生成</div>
    </div>

    <div class="section">
        <h2>选择限定标</h2>
        <div class="stamp-list" id="stampList"></div>
    </div>

    <div class="section">
        <div class="preview-area" id="previewArea"></div>

        <button class="upload-btn" id="uploadBtn">点击我上传图片</button>

        <div class="btn-group">
            <button class="process-btn" id="processBtn" disabled>开始处理</button>
            <button class="download-btn" id="downloadBtn">下载图片</button>
        </div>

        <div class="result-area" id="resultArea"></div>
    </div>
</div>

<script>
    const targetSize = { width: 450, height: 700 };
    let selectedStamp = 1;
    let uploadedFiles = [];
    let finalUrls = [];

    // 绑定DOM元素
    const stampList = document.getElementById('stampList');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.id = 'fileInput';
    fileInput.multiple = true;
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    const previewArea = document.getElementById('previewArea');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultArea = document.getElementById('resultArea');

    // 生成限定标
    for(let i=1;i<=10;i++){
        let item = document.createElement('div');
        item.className = 'stamp-item';
        if(i==1) item.classList.add('selected');
        item.innerHTML = `<img src="${i}.png">`;
        stampList.appendChild(item);
        item.onclick = ()=>{
            document.querySelectorAll('.stamp-item').forEach(s=>s.classList.remove('selected'));
            item.classList.add('selected');
            selectedStamp = i;
            checkEnable();
        }
    }

    // 上传按钮绑定
    uploadBtn.onclick = ()=>{
        fileInput.value = '';
        fileInput.click();
    };

    // 文件选择事件
    fileInput.onchange = (e)=>{
        const files = e.target.files;
        if(!files || files.length === 0) return;
        
        uploadedFiles = Array.from(files).filter(f=>f.type.startsWith('image/'));
        previewArea.innerHTML = '';
        
        uploadedFiles.forEach((f,i)=>{
            let r = new FileReader();
            r.onload = (e)=>{
                let div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${e.target.result}">`;
                previewArea.appendChild(div);
            };
            r.readAsDataURL(f);
        });
        checkEnable();
    };

    // 按钮状态检查
    function checkEnable(){
        processBtn.disabled = !(uploadedFiles.length > 0 && selectedStamp);
    }

    // 处理按钮事件
    processBtn.onclick = async ()=>{
        processBtn.innerText = "处理中...";
        processBtn.disabled = true;
        downloadBtn.style.display = "none";
        resultArea.innerHTML = '';
        finalUrls = [];

        for(let f of uploadedFiles){
            let blob = await processImg(f);
            let url = URL.createObjectURL(blob);
            finalUrls.push({url: url, name: f.name});
            let div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <img src="${url}">
                <span>${f.name}</span>
                <button class="download-btn" style="display:block;margin-left:auto">下载</button>
            `;
            resultArea.appendChild(div);
            div.querySelector('.download-btn').onclick = ()=>{
                let a = document.createElement('a');
                a.href = url;
                a.download = 'LiCN_'+f.name;
                a.click();
            };
        }

        processBtn.innerText = "处理完成";
        processBtn.disabled = false;
        downloadBtn.style.display = "block";
        resultArea.style.display = "block";
    };

    // 总下载按钮
    downloadBtn.onclick = ()=>{
        finalUrls.forEach(item=>{
            let a = document.createElement('a');
            a.href = item.url;
            a.download = 'LiCN_'+item.name;
            a.click();
        });
    };

    // 核心处理函数
    async function processImg(file){
        return new Promise((resolve) => {
            let img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = ()=>{
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                canvas.width = 450;
                canvas.height = 700;
                let s = Math.max(canvas.width/img.width, canvas.height/img.height);
                let w = img.width*s, h = img.height*s;
                ctx.drawImage(img, (canvas.width-w)/2, (canvas.height-h)/2, w, h);

                let stamp = new Image();
                stamp.crossOrigin = "anonymous";
                stamp.onload = ()=>{
                    let sw = canvas.width * 0.85;
                    let sh = stamp.height/stamp.width * sw;
                    let sx = (canvas.width - sw)/2;
                    let sy = (canvas.height - sh)/2 + sh*0.5 + 30;
                    ctx.drawImage(stamp, sx, sy, sw, sh);
                    canvas.toBlob((b)=>resolve(b),'image/png',1);
                };
                stamp.onerror = ()=>{
                    alert('限定标加载失败，请检查1-10.png是否在同一目录');
                    resolve(null);
                };
                stamp.src = selectedStamp + '.png';
            };
            img.onerror = ()=>{
                alert('图片加载失败');
                resolve(null);
            };
            img.src = URL.createObjectURL(file);
        });
    }

    // 初始检查
    checkEnable();
</script>

</body>
</html>
