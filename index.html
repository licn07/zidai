<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiCN海报助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei"}
        body{
            background:linear-gradient(135deg,#1a1a2e,#16213e);
            min-height:100vh;padding:20px;color:#fff
        }
        .container{max-width:800px;margin:0 auto}
        .header{
            text-align:center;margin:0 0 30px;
            padding:20px;background:rgba(255,255,255,.05);
            border-radius:16px;backdrop-filter:blur(10px)
        }
        .header h1{
            font-size:28px;
            background:linear-gradient(90deg,#00d4ff,#ff00ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent
        }
        .section{
            background:rgba(255,255,255,.05);
            border-radius:16px;padding:24px;margin:0 0 20px;
            backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)
        }
        .section h2{
            font-size:22px;margin:0 0 16px;
            color:#66b3ff;display:flex;align-items:center;gap:8px
        }
        .stamp-button-wrapper{text-align:center;margin:0 0 20px}
        #stampBtn{
            padding:16px 32px;border:none;
            border-radius:999px;background:linear-gradient(90deg,#0099ff,#00ccff);
            color:#fff;font-size:20px;cursor:pointer;width:100%;
            font-weight:bold
        }
        #stampBtn:hover{opacity:.9;transform:translateY(-2px);transition:all .3s}

        .stamp-modal{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,.6);display:none;
            justify-content:center;align-items:center;z-index:999
        }
        .stamp-modal.active{display:flex}
        .stamp-modal-box{
            background:#111;border-radius:14px;
            width:90%;max-width:500px;max-height:80vh;
            overflow-y:auto;padding:20px
        }
        .stamp-modal-header{
            display:flex;justify-content:space-between;
            align-items:center;margin:0 0 16px
        }
        .stamp-modal-title{font-size:18px;color:#fff}
        .stamp-close{
            font-size:22px;color:#fff;
            background:none;border:none;cursor:pointer
        }

        .stamp-grid{
            display:grid;grid-template-columns:repeat(5,1fr);
            gap:12px
        }
        .stamp-item{
            background:rgba(255,255,255,.08);
            border-radius:12px;padding:12px;
            text-align:center;cursor:pointer;
            border:2px solid transparent;
            height:80px;display:flex;align-items:center;justify-content:center
        }
        .stamp-item:hover{background:rgba(255,255,255,.12)}
        .stamp-item.selected{border-color:#ffb700;box-shadow:0 0 12px rgba(255,183,0,.4)}
        .stamp-item img{max-width:100%;max-height:100%;object-fit:contain;display:block}

        .upload-area{
            text-align:center;padding:30px;
            border:2px dashed rgba(255,255,255,.2);
            border-radius:12px;cursor:pointer;margin:0 0 20px
        }
        .upload-area:hover{border-color:#66b3ff}
        #fileInput{display:none}
        .preview-area{display:flex;flex-wrap:wrap;gap:12px;margin:0 0 20px}
        .preview-item{
            position:relative;width:120px;height:120px;
            border-radius:8px;overflow:hidden;background:#000
        }
        .preview-item img{width:100%;height:100%;object-fit:cover;display:block}
        .remove{
            position:absolute;top:4px;right:4px;
            width:24px;height:24px;background:red;
            border-radius:50%;color:#fff;display:flex;
            align-items:center;justify-content:center;cursor:pointer
        }
        .btn{
            padding:14px 32px;border:none;
            border-radius:999px;background:linear-gradient(90deg,#0099ff,#00ccff);
            color:#fff;font-size:18px;cursor:pointer;width:100%;
            font-weight:bold
        }
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* 这里缩小预览图 */
        .result-area{margin:20px 0 0;display:none}
        .result-item{
            display:flex;align-items:center;gap:10px;
            background:rgba(255,255,255,.05);padding:10px;border-radius:12px;margin:0 0 10px
        }
        .result-item img{width:50px;height:50px;object-fit:cover;border-radius:6px}
        .result-buttons{display:flex;gap:8px;margin-left:auto}
        .result-btn{
            padding:8px 14px;border:none;border-radius:8px;
            font-size:14px;cursor:pointer
        }
        .download{background:#00cc66;color:#fff}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LiCN海报助手</h1>
        <p>450x700 · 限定标处理</p>
    </div>

    <div class="section">
        <h2>选择限定标</h2>
        <div class="stamp-button-wrapper">
            <button id="stampBtn">点击选择限定标</button>
        </div>
    </div>

    <div class="section">
        <h2>上传图片</h2>
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>
            <p>点击或拖拽图片上传<br>支持 JPG / PNG / WebP</p>
        </div>
        <div class="preview-area" id="previewArea"></div>
        <button class="btn" id="processBtn" disabled>开始处理</button>
        <div class="result-area" id="resultArea"></div>
    </div>
</div>

<div class="stamp-modal" id="stampModal">
    <div class="stamp-modal-box">
        <div class="stamp-modal-header">
            <div class="stamp-modal-title">选择限定标</div>
            <button class="stamp-close" id="stampClose">×</button>
        </div>
        <div class="stamp-grid" id="stampGrid"></div>
    </div>
</div>

<script>
    const targetSize = { width: 450, height: 700 };
    const stampConfig = { sizePercent: 85 };
    let selectedStamp = null;
    let uploadedFiles = [];

    for (let i = 1; i <= 10; i++) {
        const item = document.createElement('div');
        item.className = 'stamp-item';
        item.innerHTML = `<img src="${i}.png" alt="限定标${i}">`;
        stampGrid.appendChild(item);
        item.onclick = () => {
            document.querySelectorAll('.stamp-item').forEach(s=>s.classList.remove('selected'));
            item.classList.add('selected');
            selectedStamp = i;
            stampModal.classList.remove('active');
            checkProcessBtn();
        };
    }

    stampBtn.onclick = () => stampModal.classList.add('active');
    stampClose.onclick = () => stampModal.classList.remove('active');
    stampModal.onclick = (e)=>{ if(e.target === stampModal) stampModal.classList.remove('active') }

    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    function handleFiles(files) {
        uploadedFiles = Array.from(files);
        previewArea.innerHTML = "";
        uploadedFiles.forEach((f, i) => {
            const reader = new FileReader();
            reader.onload = e => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${e.target.result}"><div class="remove" data-i="${i}">×</div>`;
                previewArea.appendChild(div);
                div.querySelector('.remove').onclick = () => { uploadedFiles.splice(i,1); div.remove(); checkProcessBtn(); }
            };
            reader.readAsDataURL(f);
        });
        checkProcessBtn();
    }

    function checkProcessBtn() {
        processBtn.disabled = !uploadedFiles.length || selectedStamp === null;
    }

    processBtn.onclick = async () => {
        resultArea.innerHTML = "";
        resultArea.style.display = "block";
        for(let f of uploadedFiles){
            const blob = await processImage(f);
            const url = URL.createObjectURL(blob);
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <img src="${url}">
                <div style="font-size:14px">${f.name}</div>
                <div class="result-buttons">
                    <button class="result-btn download" data-url="${url}" data-name="${f.name}">下载处理好的图片</button>
                </div>
            `;
            resultArea.appendChild(div);

            div.querySelector('.download').onclick = (e) => {
                const a = document.createElement('a');
                a.href = e.target.dataset.url;
                a.download = "LiCN_"+e.target.dataset.name;
                a.click();
            };
        }
    };

    async function processImage(file) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 450;
                canvas.height = 700;
                const scale = Math.max(canvas.width/img.width, canvas.height/img.height);
                const w = img.width*scale, h = img.height*scale;
                ctx.drawImage(img, (canvas.width-w)/2, (canvas.height-h)/2, w, h);

                const stamp = new Image();
                stamp.onload = () => {
                    const sW = canvas.width * 0.85;
                    const sH = stamp.height / stamp.width * sW;
                    const sx = (canvas.width - sW) / 2;
                    const sy = (canvas.height - sH) / 2 + sH*0.5 + 30;
                    ctx.drawImage(stamp, sx, sy, sW, sH);
                    canvas.toBlob(b => resolve(b), 'image/png', 1);
                };
                stamp.src = selectedStamp + ".png";
            };
            img.src = URL.createObjectURL(file);
        });
    }
</script>
</body>
</html>
